<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Iranti — Explore the Collection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:        #191512;
    --accent:    #EEB722;
    --body:      #D1C7BD;
    --muted:     #A3A3A3;
    --on-amber:  #2A1F1A;
    --border:    rgba(77,66,56,0.4);
    --scrim:     linear-gradient(transparent, rgba(25,21,18,0.78));
    --lora:'Lora', Georgia, serif;
    --inter:'Inter', system-ui, sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{
    background:var(--bg);color:var(--body);
    font-family:var(--inter);-webkit-font-smoothing:antialiased;
    font-size:14px;line-height:1.5;
    height:100%;
    overflow:hidden; /* canvas owns the viewport */
  }
  ::selection{background:rgba(238,183,34,0.28);color:#FFF8E6}

  /* ─── Navbar ─── */
  .nav{
    position:fixed;top:0;left:0;right:0;z-index:100;
    height:72px;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 32px;
    background:rgba(25,21,18,0.85);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
  }
  .nav-home{
    font-family:var(--inter);font-weight:500;font-size:14px;
    color:var(--accent);text-transform:uppercase;
    letter-spacing:1.68px;
    background:none;border:0;cursor:pointer;
  }
  .nav-search{
    display:flex;align-items:center;gap:14px;
    border:1px solid var(--border);
    border-radius:32px;
    padding:16px 64px;
    color:var(--body);
    font-family:var(--lora);font-weight:500;font-size:16px;
    letter-spacing:1.92px;
    background:transparent;
    cursor:text;
    min-width:380px;justify-content:center;
    transition:border-color .2s;
  }
  .nav-search:hover{border-color:rgba(238,183,34,0.4)}
  .nav-search svg{width:16px;height:16px;stroke-width:1.6;color:var(--body);opacity:0.85}
  .nav-right{display:flex;align-items:center;gap:24px;position:relative}
  .toggle-group{display:flex;align-items:center;gap:16px}
  .toggle{
    font-family:var(--inter);font-weight:500;font-size:14px;
    color:var(--body);background:transparent;border:0;cursor:pointer;
    padding:10px 24px;border-radius:40px;
    transition:background .2s,color .2s;
    letter-spacing:0.02em;
  }
  .toggle.active{
    background:var(--accent);color:var(--on-amber);
  }
  .toggle:not(.active):hover{color:var(--accent)}
  .dropdown-wrap{position:relative}
  .dropdown{
    display:flex;align-items:center;gap:8px;
    font-family:var(--inter);font-weight:500;font-size:16px;
    color:var(--muted);text-transform:none;
    letter-spacing:1.92px;
    background:none;border:0;cursor:pointer;
    padding:8px 4px;
    transition:color .2s;
  }
  .dropdown:hover{color:var(--body)}
  .dropdown svg{
    width:14px;height:14px;stroke-width:1.6;margin-top:2px;
    transition:transform .25s ease;
  }
  .dropdown.open svg{transform:rotate(180deg)}
  .dropdown-menu{
    position:absolute;top:calc(100% + 12px);right:0;
    min-width:240px;
    background:rgba(31,26,22,0.96);
    backdrop-filter:blur(14px);
    border:1px solid var(--border);
    border-radius:16px;
    padding:10px;
    box-shadow:0 24px 48px rgba(0,0,0,0.45);
    display:none;
    z-index:200;
  }
  .dropdown-menu.open{display:block}
  .dropdown-menu button{
    width:100%;text-align:left;
    background:none;border:0;cursor:pointer;
    color:var(--body);
    font-family:var(--inter);font-weight:500;font-size:13px;
    letter-spacing:1.4px;
    padding:11px 16px;border-radius:10px;
    display:flex;align-items:center;justify-content:space-between;
    transition:background .15s,color .15s;
  }
  .dropdown-menu button:hover{background:rgba(238,183,34,0.08);color:var(--accent)}
  .dropdown-menu button.selected{color:var(--accent)}
  .dropdown-menu button.selected::after{
    content:"";width:6px;height:6px;border-radius:50%;
    background:var(--accent);
  }

  /* ─── Stage ─── */
  .stage{
    position:fixed;inset:0;
    overflow:hidden;
    cursor:grab;
    background:
      radial-gradient(circle at 50% 50%, rgba(238,183,34,0.025), transparent 60%),
      var(--bg);
    touch-action:none;
    user-select:none;
    -webkit-user-select:none;
  }
  .stage.dragging{cursor:grabbing}

  /* The world layer — holds all artwork tiles, translated by JS */
  .world{
    position:absolute;top:0;left:0;
    width:100%;height:100%;
    will-change:transform;
  }

  /* Center category watermark — fixed to viewport */
  .watermark{
    position:fixed;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    z-index:40;
    pointer-events:none;
    font-family:var(--lora);font-weight:500;
    font-size:clamp(48px, 9vw, 128px);
    color:var(--body);
    opacity:0.15;
    letter-spacing:-0.01em;
    line-height:1;
    white-space:nowrap;
    transition:opacity .35s ease;
    user-select:none;
  }
  .watermark.swapping{opacity:0}
  .watermark .count{
    display:block;
    text-align:center;
    margin-top:14px;
    font-family:var(--inter);font-weight:500;
    font-size:11px;letter-spacing:0.32em;text-transform:uppercase;
    opacity:0.7;
  }

  /* Tiles */
  .tile{
    position:absolute;top:0;left:0;
    will-change:transform;
    cursor:pointer;
    background:#1f1a16;
    overflow:hidden;
    border-radius:0;
    transition:transform .3s ease, box-shadow .3s ease;
  }
  .tile img{
    display:block;
    width:100%;height:100%;
    object-fit:cover;
    pointer-events:none;
    -webkit-user-drag:none;
    user-select:none;
    filter:saturate(0.92) contrast(1.02);
    transition:filter .3s ease;
  }
  .tile .scrim{
    position:absolute;left:0;right:0;bottom:0;height:50%;
    background:var(--scrim);
    pointer-events:none;
    opacity:0.85;
    transition:opacity .3s ease;
  }
  .tile .meta{
    position:absolute;left:14px;right:14px;bottom:12px;
    display:flex;flex-direction:column;gap:3px;
    pointer-events:none;
    opacity:0.7;
    transition:opacity .3s ease;
  }
  .tile .cat{
    font-family:var(--inter);font-weight:500;font-size:10px;
    color:var(--accent);text-transform:uppercase;
    letter-spacing:1.5px;
  }
  .tile .title{
    font-family:var(--inter);font-weight:400;font-size:12px;
    color:var(--body);
    line-height:1.35;
  }
  .stage:not(.dragging) .tile:hover{
    transform:scale(1.03);
    z-index:2;
    box-shadow:0 18px 38px rgba(0,0,0,0.55);
  }
  .stage:not(.dragging) .tile:hover .scrim{opacity:1}
  .stage:not(.dragging) .tile:hover .meta{opacity:1}
  .stage:not(.dragging) .tile:hover img{filter:saturate(1.05) contrast(1.04)}

  /* Filter swap — fade tiles */
  .world.swapping .tile{
    opacity:0;transform:translate3d(var(--tx,0),var(--ty,0),0) scale(0.95);
    transition:opacity .25s ease, transform .25s ease;
  }

  /* Hint */
  .hint{
    position:fixed;
    left:50%;bottom:28px;transform:translateX(-50%);
    z-index:50;
    display:flex;align-items:center;gap:10px;
    padding:10px 18px;
    border:1px solid var(--border);
    border-radius:40px;
    background:rgba(25,21,18,0.6);
    backdrop-filter:blur(8px);
    color:var(--muted);
    font-family:var(--inter);font-weight:500;font-size:11px;
    letter-spacing:0.28em;text-transform:uppercase;
    pointer-events:none;
    transition:opacity .4s ease;
  }
  .hint.hidden{opacity:0}
  .hint .dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:0.35}50%{opacity:1}}

  /* Vignette overlay */
  .vignette{
    position:fixed;inset:0;
    pointer-events:none;
    z-index:30;
    background:
      radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.45) 100%);
  }

  @media (max-width:1024px){
    .nav-search{min-width:240px;padding:14px 36px}
  }
  @media (max-width:720px){
    .nav{padding:0 16px;height:64px}
    .nav-search{display:none}
    .nav-right{gap:14px}
    .toggle{padding:8px 16px;font-size:13px}
    .dropdown{font-size:14px;letter-spacing:1.4px}
  }
</style>
</head>
<body>

<nav class="nav">
  <button class="nav-home">Home</button>
  <button class="nav-search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"/><path d="M21 21l-5-5" stroke-linecap="round"/></svg>
    <span>Search</span>
  </button>
  <div class="nav-right">
    <div class="toggle-group">
      <button class="toggle active" data-view="gallery">Gallery</button>
      <button class="toggle" data-view="grid">Grid</button>
    </div>
    <div class="dropdown-wrap">
      <button class="dropdown" id="dropdownBtn">
        <span id="dropdownLabel">All works</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="dropdown-menu" id="dropdownMenu"></div>
    </div>
  </div>
</nav>

<div class="stage" id="stage">
  <div class="world" id="world"></div>
</div>

<div class="watermark" id="watermark">
  <span id="watermarkText">All Works</span>
  <span class="count" id="watermarkCount">— 30 works in view —</span>
</div>

<div class="vignette"></div>

<div class="hint" id="hint">
  <span class="dot"></span>
  <span>Drag in any direction</span>
</div>

<script>
/* ───────────────────────────────────────────────────────────
   Data
   ─────────────────────────────────────────────────────────── */
const ARTWORKS = [
  { t:"Untitled Figure Study",            c:"Painting",          w:400, h:600 },
  { t:"Ife Bronze Head",                  c:"Sculpture",         w:500, h:400 },
  { t:"Lagos Waterfront",                 c:"Photography",       w:600, h:400 },
  { t:"Adire, Olokun motif",              c:"Textiles",          w:400, h:500 },
  { t:"Market Scene, Oshodi",             c:"Painting",          w:450, h:600 },
  { t:"Warrior Figure",                   c:"Sculpture",         w:350, h:550 },
  { t:"Osun River, dawn",                 c:"Photography",       w:600, h:350 },
  { t:"Abstract Composition I",           c:"Painting",          w:500, h:500 },
  { t:"Woodblock Print Series",           c:"Prints & Drawings", w:400, h:550 },
  { t:"Light Installation, Yaba",         c:"Installation",      w:600, h:450 },
  { t:"Iyoba Pendant",                    c:"Sculpture",         w:420, h:560 },
  { t:"Onile Gogoro, hairstyle",          c:"Photography",       w:400, h:500 },
  { t:"Aso Oke, Etu pattern",             c:"Textiles",          w:520, h:380 },
  { t:"Drummers of My Father's Compound", c:"Prints & Drawings", w:560, h:400 },
  { t:"Untitled (Lagos Series)",          c:"Installation",      w:480, h:480 },
  { t:"Nok Standing Figure",              c:"Sculpture",         w:380, h:600 },
  { t:"Tutu, after Enwonwu",              c:"Painting",          w:420, h:560 },
  { t:"Akwete Cloth, ceremonial",         c:"Textiles",          w:520, h:420 },
  { t:"Studio Portrait, Modupe",          c:"Photography",       w:400, h:500 },
  { t:"Iroke Ifa, divination tapper",     c:"Sculpture",         w:340, h:600 },
  { t:"Egungun Headdress",                c:"Sculpture",         w:440, h:520 },
  { t:"The Storyteller",                  c:"Painting",          w:520, h:400 },
  { t:"Indigo Dye Vat, Abeokuta",         c:"Photography",       w:500, h:500 },
  { t:"Opon Ifa, divination tray",        c:"Sculpture",         w:560, h:380 },
  { t:"Compound Series, no. 4",           c:"Installation",      w:400, h:540 },
  { t:"Ekpe Society Mask",                c:"Sculpture",         w:380, h:540 },
  { t:"Hausa Calligraphy Study",          c:"Prints & Drawings", w:520, h:380 },
  { t:"Iya Agba",                         c:"Photography",       w:400, h:560 },
  { t:"Adire Alabere, stitched",          c:"Textiles",          w:440, h:560 },
  { t:"Compound Wall, Ile-Ife",           c:"Photography",       w:560, h:380 },
  { t:"Eshu Staff",                       c:"Sculpture",         w:340, h:600 },
  { t:"Memorial Head of a King",          c:"Sculpture",         w:420, h:520 },
  { t:"Study for a Mural",                c:"Painting",          w:600, h:380 },
  { t:"Wrapper, Akwete weave",            c:"Textiles",          w:400, h:520 },
  { t:"Refraction, mirror & thread",      c:"Installation",      w:520, h:520 },
  { t:"Charcoal Study, Hands",            c:"Prints & Drawings", w:380, h:520 },
  { t:"Coastal Light, Badagry",           c:"Photography",       w:600, h:420 },
  { t:"Ancestor Figure, seated",          c:"Sculpture",         w:400, h:560 },
  { t:"Cloth of Honour",                  c:"Textiles",          w:480, h:420 },
  { t:"Procession, oil on board",         c:"Painting",          w:560, h:400 },
];

const CATEGORIES = ["All works","Painting","Sculpture","Photography","Prints & Drawings","Textiles","Installation"];

/* ───────────────────────────────────────────────────────────
   Layout — pack tiles into a grid in WORLD space
   Strategy: column-based packing. Each column has a fixed
   width (~280px), tiles flow top-to-bottom inside columns,
   each tile keeps its true aspect ratio (height varies).
   This produces a masonry-feeling 2D field that we then tile
   infinitely via modular arithmetic.
   ─────────────────────────────────────────────────────────── */

const COL_W = 280;        // column width in world units
const GAP = 8;            // spacing between tiles
const COLS = 8;           // total columns in one tile of world
const ROWS = 5;           // approx rows per tile (used for height target)

function buildLayout(items){
  // Distribute items across columns in a balanced way (least-tall column gets next item)
  const cols = Array.from({length:COLS}, () => ({ y:0, items:[] }));
  // Round-robin shuffle for variety: deterministic seed from item count
  const ordered = items.slice();
  // gentle shuffle deterministic per category
  for (let i = ordered.length-1; i>0; i--){
    const j = (i*13 + 7) % (i+1);
    [ordered[i], ordered[j]] = [ordered[j], ordered[i]];
  }
  ordered.forEach((it, i) => {
    // pick shortest column
    let col = 0; let minY = cols[0].y;
    for (let c=1;c<COLS;c++) if (cols[c].y < minY){ minY = cols[c].y; col = c; }
    const tileW = COL_W;
    const tileH = Math.round(tileW * (it.h / it.w));
    cols[col].items.push({
      ...it,
      id: i,
      x: col * (COL_W + GAP),
      y: cols[col].y,
      w: tileW,
      h: tileH,
    });
    cols[col].y += tileH + GAP;
  });
  // World bounds: width = COLS columns; height = MAX column height (so wrapping is seamless)
  const worldW = COLS * (COL_W + GAP);
  const maxColY = Math.max(...cols.map(c=>c.y));
  // Pad world height so tiles in shorter columns don't leave huge gaps when wrapped
  const worldH = maxColY;
  // Flatten tiles
  const tiles = cols.flatMap(c => c.items);
  return { tiles, worldW, worldH };
}

/* ───────────────────────────────────────────────────────────
   Pan + render
   ─────────────────────────────────────────────────────────── */
const stage = document.getElementById('stage');
const world = document.getElementById('world');
const watermarkEl = document.getElementById('watermark');
const watermarkText = document.getElementById('watermarkText');
const watermarkCount = document.getElementById('watermarkCount');

let panX = 0, panY = 0;
let velX = 0, velY = 0;
let isDown = false, isDragging = false;
let lastX=0, lastY=0, downX=0, downY=0, lastT=0;
let raf = null;

let layout = null;
let tileNodes = []; // { node, data }

function buildTiles(items){
  // clear
  world.innerHTML = '';
  tileNodes = [];
  layout = buildLayout(items);
  layout.tiles.forEach(t => {
    const node = document.createElement('div');
    node.className = 'tile';
    node.style.width = t.w + 'px';
    node.style.height = t.h + 'px';
    const img = document.createElement('img');
    img.loading = 'lazy';
    img.alt = t.t;
    img.src = `https://picsum.photos/seed/iranti-${encodeURIComponent(t.t)}-${t.id}/${Math.round(t.w)}/${Math.round(t.h)}`;
    const scrim = document.createElement('div'); scrim.className = 'scrim';
    const meta = document.createElement('div'); meta.className = 'meta';
    const cat = document.createElement('div'); cat.className = 'cat'; cat.textContent = t.c.toUpperCase();
    const title = document.createElement('div'); title.className = 'title'; title.textContent = t.t;
    meta.append(cat, title);
    node.append(img, scrim, meta);
    world.appendChild(node);
    tileNodes.push({ node, data: t });
  });
  // initial pan: center the world roughly
  panX = -layout.worldW / 2 + window.innerWidth / 2;
  panY = -layout.worldH / 2 + window.innerHeight / 2;
  render();
}

/* Modular wrapping: for each tile, place it at the screen position
   that minimises distance to the viewport center, by adjusting which
   "tile-of-the-world" it belongs to. */
function render(){
  if (!layout) return;
  const { worldW, worldH } = layout;
  const vw = window.innerWidth, vh = window.innerHeight;
  for (let i = 0; i < tileNodes.length; i++){
    const { node, data } = tileNodes[i];
    // raw world position + pan
    let sx = data.x + panX;
    let sy = data.y + panY;
    // wrap into [- (tile.w + ~viewport), worldW - tile.w] etc.
    // Simpler: bring (sx + data.w) into [-margin, worldW + ...] using modulo
    sx = ((sx % worldW) + worldW) % worldW;
    sy = ((sy % worldH) + worldH) % worldH;
    // Now sx ∈ [0, worldW). If the tile would sit off the right edge of the
    // viewport AND its left edge > vw, shift it left by worldW so it appears
    // off the left side instead — this is the seamless tile.
    if (sx > vw)            sx -= worldW;
    if (sy > vh)            sy -= worldH;
    // If the tile is far off the left/top, push it forward by worldW/H
    if (sx + data.w < 0)    sx += worldW;
    if (sy + data.h < 0)    sy += worldH;
    node.style.transform = `translate3d(${sx}px, ${sy}px, 0)`;
  }
}

/* Drag handlers */
stage.addEventListener('pointerdown', (e) => {
  // Don't start dragging if user clicks on a tile and barely moves (we treat that as click)
  if (e.button !== undefined && e.button !== 0) return;
  isDown = true; isDragging = false;
  downX = lastX = e.clientX;
  downY = lastY = e.clientY;
  lastT = performance.now();
  velX = 0; velY = 0;
  if (raf){ cancelAnimationFrame(raf); raf = null; }
  stage.setPointerCapture(e.pointerId);
  hideHint();
});
stage.addEventListener('pointermove', (e) => {
  if (!isDown) return;
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  if (!isDragging){
    if (Math.abs(e.clientX - downX) + Math.abs(e.clientY - downY) > 4){
      isDragging = true;
      stage.classList.add('dragging');
    } else {
      return;
    }
  }
  panX += dx;
  panY += dy;
  const now = performance.now();
  const dt = Math.max(1, now - lastT);
  // exponentially-smoothed velocity (px / frame at 60fps)
  velX = 0.7 * velX + 0.3 * (dx / dt) * 16;
  velY = 0.7 * velY + 0.3 * (dy / dt) * 16;
  lastX = e.clientX; lastY = e.clientY; lastT = now;
  render();
});
function endDrag(e){
  if (!isDown) return;
  isDown = false;
  stage.classList.remove('dragging');
  if (isDragging){
    // Start momentum
    raf = requestAnimationFrame(momentum);
  }
  // small delay before allowing click — handled via isDragging flag below
  setTimeout(() => { isDragging = false; }, 40);
}
stage.addEventListener('pointerup', endDrag);
stage.addEventListener('pointercancel', endDrag);
stage.addEventListener('pointerleave', endDrag);

/* Click on tile → in real app would open detail. Suppress if dragged. */
world.addEventListener('click', (e) => {
  const tile = e.target.closest('.tile');
  if (!tile || isDragging) return;
  // pulse-feedback only — no nav
  tile.animate(
    [{ filter:'brightness(1)' }, { filter:'brightness(1.25)' }, { filter:'brightness(1)' }],
    { duration: 320, easing:'ease-out' }
  );
});

function momentum(){
  velX *= 0.94;
  velY *= 0.94;
  panX += velX;
  panY += velY;
  render();
  if (Math.abs(velX) > 0.4 || Math.abs(velY) > 0.4){
    raf = requestAnimationFrame(momentum);
  } else {
    raf = null;
  }
}

/* Wheel = pan (trackpad two-finger). Don't zoom. */
stage.addEventListener('wheel', (e) => {
  e.preventDefault();
  panX -= e.deltaX;
  panY -= e.deltaY;
  // small kick of velocity for inertia continuity
  velX = -e.deltaX * 0.3;
  velY = -e.deltaY * 0.3;
  if (!raf) raf = requestAnimationFrame(momentum);
  hideHint();
}, { passive:false });

window.addEventListener('resize', render);

/* ───────────────────────────────────────────────────────────
   Filtering + dropdown
   ─────────────────────────────────────────────────────────── */
const dropdownBtn   = document.getElementById('dropdownBtn');
const dropdownMenu  = document.getElementById('dropdownMenu');
const dropdownLabel = document.getElementById('dropdownLabel');

let currentFilter = "All works";

function renderDropdown(){
  dropdownMenu.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const btn = document.createElement('button');
    btn.textContent = cat.toUpperCase();
    if (cat === currentFilter) btn.classList.add('selected');
    btn.addEventListener('click', () => {
      setFilter(cat);
      closeDropdown();
    });
    dropdownMenu.appendChild(btn);
  });
}
function openDropdown(){
  dropdownMenu.classList.add('open');
  dropdownBtn.classList.add('open');
}
function closeDropdown(){
  dropdownMenu.classList.remove('open');
  dropdownBtn.classList.remove('open');
}
dropdownBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  if (dropdownMenu.classList.contains('open')) closeDropdown(); else openDropdown();
});
document.addEventListener('click', closeDropdown);

function setFilter(cat){
  currentFilter = cat;
  dropdownLabel.textContent = cat;
  renderDropdown();
  // swap watermark
  watermarkEl.classList.add('swapping');
  world.classList.add('swapping');
  setTimeout(() => {
    watermarkText.textContent = cat === "All works" ? "All Works" : cat;
    const filtered = cat === "All works" ? ARTWORKS : ARTWORKS.filter(a => a.c === cat);
    watermarkCount.textContent = `— ${filtered.length} works in view —`;
    buildTiles(filtered);
    watermarkEl.classList.remove('swapping');
    world.classList.remove('swapping');
  }, 280);
}

/* ───────────────────────────────────────────────────────────
   Toggle (Gallery / Grid) — visual: Grid mode forces uniform squares
   ─────────────────────────────────────────────────────────── */
let gridMode = false;
document.querySelectorAll('.toggle').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.toggle').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    gridMode = btn.dataset.view === 'grid';
    if (gridMode){
      // re-layout with all square tiles for that grid feel
      const squared = (currentFilter === "All works" ? ARTWORKS : ARTWORKS.filter(a => a.c === currentFilter))
        .map(a => ({ ...a, w: 400, h: 400 }));
      buildTilesPreservePan(squared);
    } else {
      const filtered = currentFilter === "All works" ? ARTWORKS : ARTWORKS.filter(a => a.c === currentFilter);
      buildTilesPreservePan(filtered);
    }
  });
});

function buildTilesPreservePan(items){
  const px = panX, py = panY;
  buildTiles(items);
  panX = px; panY = py; render();
}

/* ───────────────────────────────────────────────────────────
   Hint auto-hide
   ─────────────────────────────────────────────────────────── */
let hintTimer = setTimeout(() => hideHint(), 6000);
function hideHint(){
  document.getElementById('hint').classList.add('hidden');
  clearTimeout(hintTimer);
}

/* ───────────────────────────────────────────────────────────
   Init
   ─────────────────────────────────────────────────────────── */
renderDropdown();
buildTiles(ARTWORKS);
watermarkCount.textContent = `— ${ARTWORKS.length} works in view —`;

// Subtle ambient drift for the first 1.5s — invitation to interact
let ambientStart = performance.now();
function ambient(){
  const t = performance.now() - ambientStart;
  if (t > 1400 || isDown || raf) return;
  panX -= 0.35;
  panY -= 0.18;
  render();
  requestAnimationFrame(ambient);
}
requestAnimationFrame(ambient);
</script>
