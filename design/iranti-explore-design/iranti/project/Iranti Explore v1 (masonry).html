<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Iranti — Explore the Collection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:        #191512;
    --accent:    #EEB722;
    --body:      #D1C7BD;
    --muted:     #A3A3A3;
    --on-amber:  #2A1F1A;
    --border:    rgba(77,66,56,0.4);
    --scrim:     linear-gradient(transparent, rgba(25,21,18,0.78));
    --lora:'Lora', Georgia, serif;
    --inter:'Inter', system-ui, sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{
    background:var(--bg);color:var(--body);
    font-family:var(--inter);-webkit-font-smoothing:antialiased;
    font-size:14px;line-height:1.5;
  }
  body{min-height:100vh}
  ::selection{background:rgba(238,183,34,0.28);color:#FFF8E6}

  /* ─── Navbar ─── */
  .nav{
    position:fixed;top:0;left:0;right:0;z-index:50;
    height:72px;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 32px;
    background:rgba(25,21,18,0.85);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
  }
  .nav-home{
    font-family:var(--inter);font-weight:500;font-size:14px;
    color:var(--accent);text-transform:uppercase;
    letter-spacing:1.68px;
    background:none;border:0;cursor:pointer;
  }
  .nav-search{
    display:flex;align-items:center;gap:14px;
    border:1px solid var(--border);
    border-radius:32px;
    padding:14px 56px;
    color:var(--body);
    font-family:var(--lora);font-weight:500;font-size:16px;
    letter-spacing:1.92px;
    background:transparent;
    cursor:text;
    min-width:380px;justify-content:center;
    transition:border-color .2s;
  }
  .nav-search:hover{border-color:rgba(238,183,34,0.4)}
  .nav-search svg{width:16px;height:16px;stroke-width:1.6;color:var(--body);opacity:0.85}
  .nav-right{display:flex;align-items:center;gap:24px}
  .toggle-group{display:flex;align-items:center;gap:16px}
  .toggle{
    font-family:var(--inter);font-weight:500;font-size:14px;
    color:var(--body);background:transparent;border:0;cursor:pointer;
    padding:10px 24px;border-radius:40px;
    transition:background .2s,color .2s;
    letter-spacing:0.02em;
  }
  .toggle.active{
    background:var(--accent);color:var(--on-amber);
  }
  .toggle:not(.active):hover{color:var(--accent)}
  .dropdown{
    display:flex;align-items:center;gap:8px;
    font-family:var(--inter);font-weight:500;font-size:16px;
    color:var(--muted);text-transform:none;
    letter-spacing:1.92px;
    background:none;border:0;cursor:pointer;
    padding:8px 4px;
    transition:color .2s;
  }
  .dropdown:hover{color:var(--body)}
  .dropdown svg{width:14px;height:14px;stroke-width:1.6;margin-top:2px}

  /* ─── Hero ─── */
  .hero{
    padding:200px 32px 100px;
    text-align:center;
  }
  .hero h1{
    font-family:var(--lora);font-weight:500;font-style:normal;
    font-size:49px;color:var(--body);letter-spacing:-0.01em;
    line-height:1.1;
  }
  .hero .eyebrow{
    font-family:var(--inter);font-weight:500;font-size:11px;
    color:var(--accent);text-transform:uppercase;letter-spacing:0.32em;
    margin-bottom:18px;
  }

  /* ─── Masonry ─── */
  .masonry-wrap{padding:0 16px 120px}
  .masonry{
    column-count:5;
    column-gap:8px;
  }
  @media (max-width:1400px){ .masonry{column-count:4} }
  @media (max-width:1024px){ .masonry{column-count:3} .nav-search{min-width:240px;padding:12px 32px} }
  @media (max-width:720px){
    .masonry{column-count:2}
    .nav{padding:0 16px;height:64px}
    .nav-search{display:none}
    .hero{padding:150px 16px 64px}
    .hero h1{font-size:36px}
  }
  @media (max-width:480px){ .masonry{column-count:1} }

  .card{
    break-inside:avoid;
    margin-bottom:8px;
    position:relative;
    overflow:hidden;
    cursor:pointer;
    background:#1f1a16;
    transition:transform .35s ease;
    opacity:0;transform:translateY(20px);
    animation:rise .5s ease forwards;
  }
  @keyframes rise{ to { opacity:1; transform:translateY(0); } }
  .card:hover{ transform:scale(1.02) }
  .card img{
    display:block;width:100%;height:auto;
    border-radius:0;
    transition:filter .3s;
  }
  .card-scrim{
    position:absolute;left:0;right:0;bottom:0;height:42%;
    background:var(--scrim);
    pointer-events:none;
    transition:opacity .3s;
    opacity:0.85;
  }
  .card:hover .card-scrim{opacity:1}
  .card-meta{
    position:absolute;left:14px;bottom:12px;right:14px;
    display:flex;flex-direction:column;gap:3px;
    pointer-events:none;
  }
  .card-cat{
    font-family:var(--inter);font-weight:500;font-size:10px;
    color:var(--accent);text-transform:uppercase;
    letter-spacing:1.5px;
    opacity:0.92;
  }
  .card-title{
    font-family:var(--inter);font-weight:400;font-size:12px;
    color:var(--body);
    line-height:1.35;
    opacity:0.9;
  }
  .card:hover .card-title,.card:hover .card-cat{opacity:1}

  /* Section divider — full-width inside columns */
  .divider{
    column-span:all;
    text-align:center;
    padding:80px 16px 80px;
    margin:0;
  }
  .divider .label{
    font-family:var(--inter);font-weight:500;font-size:10px;
    color:var(--accent);text-transform:uppercase;letter-spacing:0.32em;
    margin-bottom:14px;
    opacity:0.8;
  }
  .divider .name{
    font-family:var(--lora);font-weight:500;font-size:72px;
    color:var(--body);
    opacity:0.6;
    line-height:1;
    letter-spacing:-0.01em;
  }
  @media (max-width:720px){
    .divider{padding:48px 16px}
    .divider .name{font-size:42px}
  }

  /* Loading */
  .loader{
    grid-column:1/-1;
    display:flex;align-items:center;justify-content:center;gap:10px;
    padding:64px 0 32px;
    font-family:var(--lora);font-style:italic;font-size:14px;
    color:var(--muted);
  }
  .loader .pulse{
    width:6px;height:6px;border-radius:50%;
    background:var(--accent);
    animation:pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:0.3;transform:scale(0.85)}
    50%{opacity:1;transform:scale(1.15)}
  }

  /* sentinel */
  #sentinel{height:1px;width:100%}
</style>
</head>
<body>

<nav class="nav">
  <button class="nav-home">Home</button>
  <button class="nav-search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"/><path d="M21 21l-5-5" stroke-linecap="round"/></svg>
    <span>Search</span>
  </button>
  <div class="nav-right">
    <div class="toggle-group">
      <button class="toggle active" data-view="gallery">Gallery</button>
      <button class="toggle" data-view="grid">Grid</button>
    </div>
    <button class="dropdown">
      All works
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
</nav>

<header class="hero">
  <div class="eyebrow">Iranti · Memory of the Collection</div>
  <h1 id="section-title">All Works</h1>
</header>

<section class="masonry-wrap">
  <div class="masonry" id="masonry"></div>
  <div class="loader" id="loader" style="display:none">
    <span class="pulse"></span>
    <span>Loading more from the collection…</span>
  </div>
</section>

<script>
  const CATEGORIES = ["Painting","Sculpture","Photography","Prints & Drawings","Textiles","Installation"];

  // base set — varied aspect ratios for true masonry
  const BASE = [
    { t:"Untitled Figure Study",      c:"Painting",          w:400, h:600 },
    { t:"Ife Bronze Head",            c:"Sculpture",         w:500, h:400 },
    { t:"Lagos Waterfront",           c:"Photography",       w:400, h:500 },
    { t:"Adire Cloth, Olokun motif",  c:"Textiles",          w:600, h:400 },
    { t:"Market Scene, Oshodi",       c:"Painting",          w:450, h:600 },
    { t:"Gelede Mask Study",          c:"Prints & Drawings", w:400, h:520 },
    { t:"Iyoba Pendant",              c:"Sculpture",         w:420, h:560 },
    { t:"Onile Gogoro, hairstyle",    c:"Photography",       w:400, h:500 },
    { t:"Aso Oke, Etu pattern",       c:"Textiles",          w:500, h:380 },
    { t:"Drummers of My Father's Compound", c:"Prints & Drawings", w:560, h:400 },
    { t:"Untitled (Lagos Series)",    c:"Installation",      w:480, h:480 },
    { t:"Nok Standing Figure",        c:"Sculpture",         w:380, h:600 },
    { t:"Tutu, after Enwonwu",        c:"Painting",          w:420, h:560 },
    { t:"Akwete Cloth, ceremonial",   c:"Textiles",          w:520, h:420 },
    { t:"Studio Portrait, Modupe",    c:"Photography",       w:400, h:500 },
    { t:"Iroke Ifa, divination tapper", c:"Sculpture",       w:340, h:600 },
    { t:"Egungun Headdress",          c:"Sculpture",         w:440, h:520 },
    { t:"The Storyteller",            c:"Painting",          w:520, h:400 },
    { t:"Indigo Dye Vat, Abeokuta",   c:"Photography",       w:500, h:500 },
    { t:"Opon Ifa, divination tray",  c:"Sculpture",         w:560, h:380 },
    { t:"Untitled, Compound Series",  c:"Installation",      w:400, h:540 },
    { t:"Ekpe Society Mask",          c:"Sculpture",         w:380, h:540 },
    { t:"Hausa Calligraphy Study",    c:"Prints & Drawings", w:520, h:380 },
    { t:"Iya Agba",                   c:"Photography",       w:400, h:560 },
    { t:"Adire Alabere, stitched",    c:"Textiles",          w:440, h:560 },
    { t:"Compound Wall, Ile-Ife",     c:"Photography",       w:560, h:380 },
    { t:"Eshu Staff",                 c:"Sculpture",         w:340, h:600 },
    { t:"Memorial Head of a King",    c:"Sculpture",         w:420, h:520 },
    { t:"Study for a Mural",          c:"Painting",          w:600, h:380 },
    { t:"Wrapper, Akwete weave",      c:"Textiles",          w:400, h:520 },
  ];

  const masonry = document.getElementById('masonry');
  const loader = document.getElementById('loader');
  const sectionTitle = document.getElementById('section-title');

  // categories that get an environmental divider when first encountered in a batch
  const SECTION_ORDER = ["Painting","Sculpture","Photography","Textiles","Prints & Drawings","Installation"];
  const seenSections = new Set();

  let seed = 1;
  let batch = 0;
  function randId(){ return seed++; }

  function makeCard(item, idx){
    const card = document.createElement('article');
    card.className = 'card';
    card.style.animationDelay = (Math.min(idx,12) * 0.04) + 's';
    const img = document.createElement('img');
    img.loading = 'lazy';
    img.src = `https://picsum.photos/seed/iranti-${item.id}/${item.w}/${item.h}`;
    img.alt = item.t;
    img.width = item.w; img.height = item.h;
    img.style.aspectRatio = `${item.w}/${item.h}`;
    const scrim = document.createElement('div'); scrim.className='card-scrim';
    const meta = document.createElement('div'); meta.className='card-meta';
    const cat = document.createElement('div'); cat.className='card-cat'; cat.textContent = item.c.toUpperCase();
    const title = document.createElement('div'); title.className='card-title'; title.textContent = item.t;
    meta.append(cat, title);
    card.append(img, scrim, meta);
    return card;
  }

  function makeDivider(name){
    const d = document.createElement('div');
    d.className = 'divider';
    d.innerHTML = `<div class="label">Section</div><div class="name">${name}</div>`;
    return d;
  }

  function appendBatch(){
    const items = BASE.map(b => ({ ...b, id: randId() }));
    // pick a section header for this batch
    const nextSection = SECTION_ORDER.find(s => !seenSections.has(s));
    if (nextSection) {
      seenSections.add(nextSection);
      // place divider after first 6 cards into this batch for natural rhythm
      items.splice(6, 0, { divider: nextSection });
    }
    items.forEach((it, i) => {
      const node = it.divider ? makeDivider(it.divider) : makeCard(it, i);
      masonry.appendChild(node);
    });
    batch++;
  }

  // initial load
  appendBatch();

  // infinite scroll
  let loading = false;
  const sentinel = document.createElement('div');
  sentinel.id = 'sentinel';
  document.querySelector('.masonry-wrap').appendChild(sentinel);

  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting && !loading && batch < 8) {
        loading = true;
        loader.style.display = 'flex';
        setTimeout(() => {
          appendBatch();
          loading = false;
          if (batch >= 8) loader.style.display = 'none';
          else loader.style.display = 'none';
        }, 600);
      }
    });
  }, { rootMargin: '600px 0px' });
  io.observe(sentinel);

  // toggle (visual only)
  document.querySelectorAll('.toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.toggle').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (btn.dataset.view === 'grid') {
        document.querySelectorAll('.card img').forEach(img => { img.style.aspectRatio = '1/1'; img.style.objectFit='cover'; });
      } else {
        document.querySelectorAll('.card img').forEach(img => { img.style.aspectRatio = ''; img.style.objectFit=''; });
      }
    });
  });

  // dropdown — cycle category & update hero title
  const FILTERS = ["All works", ...CATEGORIES];
  let filterIdx = 0;
  document.querySelector('.dropdown').addEventListener('click', () => {
    filterIdx = (filterIdx + 1) % FILTERS.length;
    const label = FILTERS[filterIdx];
    document.querySelector('.dropdown').firstChild.textContent = label + ' ';
    sectionTitle.textContent = label === "All works" ? "All Works" : label;
  });
</script>

</body>
</html>
