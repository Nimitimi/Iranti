<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Iranti — Explore the Collection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:        #191512;
    --accent:    #EEB722;
    --body:      #D1C7BD;
    --muted:     #A3A3A3;
    --on-amber:  #2A1F1A;
    --border:    rgba(77,66,56,0.4);
    --scrim:     linear-gradient(transparent, rgba(25,21,18,0.75));
    --lora:'Lora', Georgia, serif;
    --inter:'Inter', system-ui, sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{
    background:var(--bg);color:var(--body);
    font-family:var(--inter);-webkit-font-smoothing:antialiased;
    font-size:14px;line-height:1.5;
    height:100%;
    overflow:hidden;
  }
  ::selection{background:rgba(238,183,34,0.28);color:#FFF8E6}

  /* ─── Navbar ─── */
  .nav{
    position:fixed;top:0;left:0;right:0;z-index:100;
    height:72px;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 32px;
    background:rgba(25,21,18,0.85);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
  }
  .nav-home{
    font-family:var(--inter);font-weight:500;font-size:14px;
    color:var(--accent);text-transform:uppercase;
    letter-spacing:1.68px;
    background:none;border:0;cursor:pointer;
  }
  .nav-search{
    display:flex;align-items:center;gap:14px;
    border:1px solid var(--border);
    border-radius:32px;
    padding:16px 64px;
    color:var(--body);
    font-family:var(--lora);font-weight:500;font-size:16px;
    letter-spacing:1.92px;
    background:transparent;
    cursor:text;
    min-width:380px;justify-content:center;
    transition:border-color .2s;
  }
  .nav-search:hover{border-color:rgba(238,183,34,0.4)}
  .nav-search svg{width:16px;height:16px;stroke-width:1.6;color:var(--body);opacity:0.85}
  .nav-right{display:flex;align-items:center;gap:24px;position:relative}
  .toggle-group{display:flex;align-items:center;gap:16px}
  .toggle{
    font-family:var(--inter);font-weight:500;font-size:14px;
    color:var(--body);background:transparent;border:0;cursor:pointer;
    padding:10px 24px;border-radius:40px;
    transition:background .2s,color .2s;
    letter-spacing:0.02em;
  }
  .toggle.active{ background:var(--accent);color:var(--on-amber); }
  .toggle:not(.active):hover{color:var(--accent)}
  .dropdown-wrap{position:relative}
  .dropdown{
    display:flex;align-items:center;gap:8px;
    font-family:var(--inter);font-weight:500;font-size:16px;
    color:var(--muted);text-transform:none;
    letter-spacing:1.92px;
    background:none;border:0;cursor:pointer;
    padding:8px 4px;
    transition:color .2s;
  }
  .dropdown:hover{color:var(--body)}
  .dropdown svg{
    width:14px;height:14px;stroke-width:1.6;margin-top:2px;
    transition:transform .25s ease;
  }
  .dropdown.open svg{transform:rotate(180deg)}
  .dropdown-menu{
    position:absolute;top:calc(100% + 12px);right:0;
    min-width:240px;
    background:rgba(31,26,22,0.96);
    backdrop-filter:blur(14px);
    border:1px solid var(--border);
    border-radius:16px;
    padding:10px;
    box-shadow:0 24px 48px rgba(0,0,0,0.45);
    display:none;
    z-index:200;
  }
  .dropdown-menu.open{display:block}
  .dropdown-menu button{
    width:100%;text-align:left;
    background:none;border:0;cursor:pointer;
    color:var(--body);
    font-family:var(--inter);font-weight:500;font-size:13px;
    letter-spacing:1.4px;
    padding:11px 16px;border-radius:10px;
    display:flex;align-items:center;justify-content:space-between;
    transition:background .15s,color .15s;
  }
  .dropdown-menu button:hover{background:rgba(238,183,34,0.08);color:var(--accent)}
  .dropdown-menu button.selected{color:var(--accent)}
  .dropdown-menu button.selected::after{
    content:"";width:6px;height:6px;border-radius:50%;
    background:var(--accent);
  }

  /* ─── Stage ─── */
  .stage{
    position:fixed;inset:0;
    overflow:hidden;
    cursor:grab;
    background:var(--bg);
    touch-action:none;
    user-select:none;
    -webkit-user-select:none;
  }
  .stage.dragging{cursor:grabbing}

  .world{
    position:absolute;top:0;left:0;
    width:100%;height:100%;
    will-change:transform;
  }

  /* Center title block — lives in world space */
  .center-title{
    position:absolute;top:0;left:0;
    width:380px;
    text-align:center;
    pointer-events:none;
    transition:opacity .35s ease;
    will-change:transform,opacity;
  }
  .center-title.swapping{opacity:0}
  .center-title .museum{
    font-family:var(--inter);font-weight:500;font-size:12px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:2px;
    margin-bottom:18px;
  }
  .center-title .name{
    font-family:var(--lora);font-weight:500;
    font-size:56px;
    color:var(--body);
    line-height:1.05;
    letter-spacing:-0.01em;
    margin-bottom:14px;
  }
  .center-title .tag{
    font-family:var(--lora);font-weight:400;font-style:italic;
    font-size:14px;
    color:var(--muted);
  }

  /* Tiles */
  .tile{
    position:absolute;top:0;left:0;
    will-change:transform;
    cursor:pointer;
    background:#1f1a16;
    overflow:hidden;
    border-radius:0;
    transition:transform .3s ease, box-shadow .3s ease, opacity .3s ease;
  }
  .tile img{
    display:block;
    width:100%;height:100%;
    object-fit:cover;
    pointer-events:none;
    -webkit-user-drag:none;
    user-select:none;
    filter:saturate(0.92) contrast(1.02);
    transition:filter .3s ease;
  }
  .tile .scrim{
    position:absolute;left:0;right:0;bottom:0;height:42%;
    background:var(--scrim);
    pointer-events:none;
    opacity:0.85;
    transition:opacity .3s ease;
  }
  .tile .meta{
    position:absolute;left:12px;right:12px;bottom:10px;
    display:flex;flex-direction:column;gap:3px;
    pointer-events:none;
    opacity:0.78;
    transition:opacity .3s ease;
  }
  .tile .cat{
    font-family:var(--inter);font-weight:500;font-size:10px;
    color:var(--accent);text-transform:uppercase;
    letter-spacing:1.5px;
  }
  .tile .title{
    font-family:var(--inter);font-weight:400;font-size:12px;
    color:var(--body);
    line-height:1.35;
  }
  .stage:not(.dragging) .tile:hover{
    transform:scale(1.04) translate3d(var(--tx,0),var(--ty,0),0);
    z-index:5;
    box-shadow:0 18px 38px rgba(0,0,0,0.55);
  }
  .stage:not(.dragging) .tile:hover .scrim{opacity:1}
  .stage:not(.dragging) .tile:hover .meta{opacity:1}
  .stage:not(.dragging) .tile:hover img{filter:saturate(1.05) contrast(1.04)}

  .world.swapping .tile{
    opacity:0;
    transition:opacity .2s ease;
  }

  /* Hint */
  .hint{
    position:fixed;
    left:50%;bottom:28px;transform:translateX(-50%);
    z-index:50;
    display:flex;align-items:center;gap:10px;
    padding:10px 18px;
    border:1px solid var(--border);
    border-radius:40px;
    background:rgba(25,21,18,0.6);
    backdrop-filter:blur(8px);
    color:var(--muted);
    font-family:var(--inter);font-weight:500;font-size:11px;
    letter-spacing:0.28em;text-transform:uppercase;
    pointer-events:none;
    transition:opacity .4s ease;
  }
  .hint.hidden{opacity:0}
  .hint .dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:0.35}50%{opacity:1}}

  .vignette{
    position:fixed;inset:0;
    pointer-events:none;
    z-index:30;
    background:radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.4) 100%);
  }

  @media (max-width:1024px){ .nav-search{min-width:240px;padding:14px 36px} }
  @media (max-width:720px){
    .nav{padding:0 16px;height:64px}
    .nav-search{display:none}
    .nav-right{gap:14px}
    .toggle{padding:8px 16px;font-size:13px}
    .dropdown{font-size:14px;letter-spacing:1.4px}
    .center-title .name{font-size:38px}
    .center-title{width:300px}
  }
</style>
</head>
<body>

<nav class="nav">
  <button class="nav-home">Home</button>
  <button class="nav-search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"/><path d="M21 21l-5-5" stroke-linecap="round"/></svg>

</nav>

<div class="stage" id="stage">

</div>

<div class="vignette"></div>

</div>

<script>
/* ───────────────────────────────────────────────────────────
   Data — 40 works
   ─────────────────────────────────────────────────────────── */
const ARTWORKS = [

  { id:26, t:"Charcoal on Newsprint",      c:"Prints & Drawings", w:240, h:320 },
  { id:27, t:"Morning Offering",           c:"Painting",          w:260, h:380 },
  { id:28, t:"Bronze Bracelet",            c:"Sculpture",         w:300, h:240 },
  { id:29, t:"Festival Night",             c:"Photography",       w:320, h:220 },
  { id:30, t:"Resist Dye Cloth",           c:"Textiles",          w:280, h:360 },
  { id:31, t:"Wall of Sound",              c:"Installation",      w:320, h:240 },
  { id:32, t:"Seated Elder",               c:"Sculpture",         w:240, h:380 },
  { id:33, t:"Delta Landscape",            c:"Painting",          w:320, h:200 },
  { id:34, t:"Lithograph No. 7",           c:"Prints & Drawings", w:260, h:300 },
  { id:35, t:"Bar Beach Sunset",           c:"Photography",       w:300, h:200 },
  { id:36, t:"Ceramic Vessel",             c:"Sculpture",         w:260, h:300 },
  { id:37, t:"The Gathering",              c:"Painting",          w:300, h:360 },
  { id:38, t:"Embroidered Panel",          c:"Textiles",          w:280, h:320 },
  { id:39, t:"Light Box Study",            c:"Installation",      w:300, h:300 },
  { id:40, t:"Self Portrait",              c:"Painting",          w:260, h:360 },
];

const CATEGORIES = ["All works","Painting","Sculpture","Photography","Prints & Drawings","Textiles","Installation"];

/* ───────────────────────────────────────────────────────────
   Layout
   The world is a grid of cells. Each artwork sits in a cell
   with random offset/size variation for organic feel.
   The center cell (col=cx, row=cy) is reserved for the title.
   The grid wraps via modular arithmetic — infinite tiling.
   ─────────────────────────────────────────────────────────── */

const CELL_W = 380;
const CELL_H = 420;

const stage = document.getElementById('stage');
const world = document.getElementById('world');
const centerTitle = document.getElementById('centerTitle');
const centerName  = document.getElementById('centerName');

let panX = 0, panY = 0;
let velX = 0, velY = 0;
let isDown = false, isDragging = false;
let lastX=0, lastY=0, downX=0, downY=0, lastT=0;
let raf = null;

let layout = null;       // { cells:[{x,y,worldX,worldY,art,tileW,tileH,offX,offY}], cols, rows, worldW, worldH, centerWX, centerWY }
let tileNodes = [];      // { node, cell }

/* Deterministic pseudo-random, seeded by id so the same artwork
   always lands in the same in-cell position. */
function seedRand(seed){
  let s = seed * 9301 + 49297;
  return function(){
    s = (s * 9301 + 49297) % 233280;
    return s / 233280;
  };
}

function buildLayout(items){
  // Choose a cols × rows that fits all items + 1 reserved center cell
  const n = items.length + 1;
  let cols = Math.max(5, Math.ceil(Math.sqrt(n * 1.4))); // wider than tall
  let rows = Math.ceil(n / cols);
  if ((cols * rows) < n) rows++;
  // ensure odd cols/rows so there's a clean center
  if (cols % 2 === 0) cols++;
  if (rows % 2 === 0) rows++;
  const cx = Math.floor(cols / 2);
  const cy = Math.floor(rows / 2);

  // Spiral cell-fill order from center outward, skipping the center cell
  const cellOrder = [];
  // simple: enumerate all cells, sort by distance from center
  const all = [];
  for (let r = 0; r < rows; r++){
    for (let c = 0; c < cols; c++){
      if (c === cx && r === cy) continue;
      const dx = c - cx, dy = r - cy;
      all.push({ c, r, d: dx*dx + dy*dy + Math.random()*0.001 });
    }
  }
  all.sort((a,b) => a.d - b.d);
  cellOrder.push(...all);

  const cells = items.map((art, i) => {
    const { c, r } = cellOrder[i];
    const rand = seedRand(art.id * 31);
    // scale tile to fit comfortably inside cell with breathing room
    const maxTileW = CELL_W - 80; // leave at least 40px gap each side
    const maxTileH = CELL_H - 80;
    const ratio = art.w / art.h;
    let tileW = maxTileW;
    let tileH = tileW / ratio;
    if (tileH > maxTileH){ tileH = maxTileH; tileW = tileH * ratio; }
    // small variation in size (0.85-1.0)
    const scale = 0.82 + rand() * 0.18;
    tileW *= scale; tileH *= scale;
    // offset within cell — keeps tile away from edges
    const slackX = (CELL_W - tileW) / 2;
    const slackY = (CELL_H - tileH) / 2;
    const offX = (rand() - 0.5) * slackX * 0.5;
    const offY = (rand() - 0.5) * slackY * 0.5;
    const cellLeft = c * CELL_W;
    const cellTop  = r * CELL_H;
    const worldX = cellLeft + (CELL_W - tileW) / 2 + offX;
    const worldY = cellTop  + (CELL_H - tileH) / 2 + offY;
    return { c, r, worldX, worldY, art, tileW, tileH };
  });

  const worldW = cols * CELL_W;
  const worldH = rows * CELL_H;
  // Center title world position — top-left of the center cell, centered horizontally within it
  // (the title element is 380px wide = exactly CELL_W → so worldX = cx * CELL_W puts it spanning the center cell)
  const centerWX = cx * CELL_W;
  const centerWY = cy * CELL_H + (CELL_H - 140) / 2; // vertically center ~140px tall block
  return { cells, cols, rows, cx, cy, worldW, worldH, centerWX, centerWY };
}

function buildTiles(items){
  // remove old tile nodes (keep center title)
  tileNodes.forEach(t => t.node.remove());
  tileNodes = [];
  layout = buildLayout(items);
  layout.cells.forEach(cell => {
    const node = document.createElement('div');
    node.className = 'tile';
    node.style.width  = cell.tileW + 'px';
    node.style.height = cell.tileH + 'px';
    const img = document.createElement('img');
    img.loading = 'lazy';
    img.alt = cell.art.t;
    img.src = `https://picsum.photos/seed/iranti-${cell.art.id}/${Math.round(cell.tileW)}/${Math.round(cell.tileH)}`;
    const scrim = document.createElement('div'); scrim.className = 'scrim';
    const meta = document.createElement('div'); meta.className = 'meta';
    const cat = document.createElement('div'); cat.className = 'cat'; cat.textContent = cell.art.c.toUpperCase();
    const title = document.createElement('div'); title.className = 'title'; title.textContent = cell.art.t;
    meta.append(cat, title);
    node.append(img, scrim, meta);
    world.appendChild(node);
    tileNodes.push({ node, cell });
  });
  render();
}

/* Wrap a value into [-half, +half] range around viewport center.
   This places each tile at the closest equivalent position to the
   current view, giving infinite tiling. */
function wrap(v, period){
  // bring into [0, period)
  v = ((v % period) + period) % period;
  return v;
}

function render(){
  if (!layout) return;
  const { worldW, worldH, centerWX, centerWY } = layout;
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  // Tiles
  for (let i = 0; i < tileNodes.length; i++){
    const { node, cell } = tileNodes[i];
    let sx = wrap(cell.worldX + panX, worldW);
    let sy = wrap(cell.worldY + panY, worldH);
    // shift into [-tileW, vw] / [-tileH, vh] window
    if (sx > vw) sx -= worldW;
    if (sy > vh) sy -= worldH;
    if (sx + cell.tileW < 0) sx += worldW;
    if (sy + cell.tileH < 0) sy += worldH;
    node.style.transform = `translate3d(${sx}px, ${sy}px, 0)`;
  }

  // Center title — also wraps, so it appears repeatedly across the canvas
  let tx = wrap(centerWX + panX, worldW);
  let ty = wrap(centerWY + panY, worldH);
  if (tx > vw) tx -= worldW;
  if (ty > vh) ty -= worldH;
  if (tx + 380 < 0) tx += worldW;
  if (ty + 140 < 0) ty += worldH;
  centerTitle.style.transform = `translate3d(${tx}px, ${ty}px, 0)`;
}

/* ───────────────────────────────────────────────────────────
   Drag + momentum
   ─────────────────────────────────────────────────────────── */
stage.addEventListener('pointerdown', (e) => {
  if (e.button !== undefined && e.button !== 0) return;
  isDown = true; isDragging = false;
  downX = lastX = e.clientX;
  downY = lastY = e.clientY;
  lastT = performance.now();
  velX = 0; velY = 0;
  if (raf){ cancelAnimationFrame(raf); raf = null; }
  stage.setPointerCapture(e.pointerId);
  hideHint();
});
stage.addEventListener('pointermove', (e) => {
  if (!isDown) return;
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  if (!isDragging){
    if (Math.abs(e.clientX - downX) + Math.abs(e.clientY - downY) > 4){
      isDragging = true;
      stage.classList.add('dragging');
    } else return;
  }
  panX += dx;
  panY += dy;
  const now = performance.now();
  const dt = Math.max(1, now - lastT);
  velX = 0.7 * velX + 0.3 * (dx / dt) * 16;
  velY = 0.7 * velY + 0.3 * (dy / dt) * 16;
  lastX = e.clientX; lastY = e.clientY; lastT = now;
  render();
});
function endDrag(){
  if (!isDown) return;
  isDown = false;
  stage.classList.remove('dragging');
  if (isDragging) raf = requestAnimationFrame(momentum);
  setTimeout(() => { isDragging = false; }, 40);
}
stage.addEventListener('pointerup', endDrag);
stage.addEventListener('pointercancel', endDrag);
stage.addEventListener('pointerleave', endDrag);

world.addEventListener('click', (e) => {
  const tile = e.target.closest('.tile');
  if (!tile || isDragging) return;
  tile.animate(
    [{ filter:'brightness(1)' }, { filter:'brightness(1.25)' }, { filter:'brightness(1)' }],
    { duration: 320, easing:'ease-out' }
  );
});

function momentum(){
  velX *= 0.94;
  velY *= 0.94;
  panX += velX;
  panY += velY;
  render();
  if (Math.abs(velX) > 0.4 || Math.abs(velY) > 0.4){
    raf = requestAnimationFrame(momentum);
  } else raf = null;
}

stage.addEventListener('wheel', (e) => {
  e.preventDefault();
  panX -= e.deltaX;
  panY -= e.deltaY;
  velX = -e.deltaX * 0.3;
  velY = -e.deltaY * 0.3;
  if (!raf) raf = requestAnimationFrame(momentum);
  hideHint();
}, { passive:false });

window.addEventListener('resize', render);

/* ───────────────────────────────────────────────────────────
   Dropdown + filter
   ─────────────────────────────────────────────────────────── */
const dropdownBtn   = document.getElementById('dropdownBtn');
const dropdownMenu  = document.getElementById('dropdownMenu');
const dropdownLabel = document.getElementById('dropdownLabel');
let currentFilter = "All works";
let gridMode = false;

function renderDropdown(){
  dropdownMenu.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const btn = document.createElement('button');
    btn.textContent = cat.toUpperCase();
    if (cat === currentFilter) btn.classList.add('selected');
    btn.addEventListener('click', () => {
      setFilter(cat);
      closeDropdown();
    });
    dropdownMenu.appendChild(btn);
  });
}
function openDropdown(){ dropdownMenu.classList.add('open'); dropdownBtn.classList.add('open'); }
function closeDropdown(){ dropdownMenu.classList.remove('open'); dropdownBtn.classList.remove('open'); }
dropdownBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  if (dropdownMenu.classList.contains('open')) closeDropdown(); else openDropdown();
});
document.addEventListener('click', closeDropdown);

function getActiveItems(){
  let items = currentFilter === "All works" ? ARTWORKS : ARTWORKS.filter(a => a.c === currentFilter);
  if (gridMode) items = items.map(a => ({ ...a, w: 300, h: 300 }));
  return items;
}

function setFilter(cat){
  currentFilter = cat;
  dropdownLabel.textContent = cat;
  renderDropdown();
  centerTitle.classList.add('swapping');
  world.classList.add('swapping');
  setTimeout(() => {
    centerName.textContent = cat === "All works" ? "All Works" : cat;
    buildTiles(getActiveItems());
    centerTitle.classList.remove('swapping');
    world.classList.remove('swapping');
  }, 220);
}

/* ───────────────────────────────────────────────────────────
   Gallery / Grid toggle
   ─────────────────────────────────────────────────────────── */
document.querySelectorAll('.toggle').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.toggle').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    gridMode = btn.dataset.view === 'grid';
    const px = panX, py = panY;
    buildTiles(getActiveItems());
    panX = px; panY = py; render();
  });
});

/* ───────────────────────────────────────────────────────────
   Hint
   ─────────────────────────────────────────────────────────── */
let hintTimer = setTimeout(() => hideHint(), 6000);
function hideHint(){
  document.getElementById('hint').classList.add('hidden');
  clearTimeout(hintTimer);
}

/* ───────────────────────────────────────────────────────────
   Init — center the world so the center cell is at viewport center
   ─────────────────────────────────────────────────────────── */
renderDropdown();
buildTiles(ARTWORKS);
// position so center title appears at viewport center
panX = -layout.centerWX - 380/2 + window.innerWidth / 2 + 380/2;
panY = -layout.centerWY - 140/2 + window.innerHeight / 2 + 140/2;
// (simpler:)
panX = window.innerWidth / 2 - layout.centerWX - 380/2;
panY = window.innerHeight / 2 - layout.centerWY - 140/2;
render();

/* Subtle ambient drift for invitation */
let ambientStart = performance.now();
function ambient(){
  const t = performance.now() - ambientStart;
  if (t > 1400 || isDown || raf) return;
  panX -= 0.3;
  panY -= 0.15;
  render();
  requestAnimationFrame(ambient);
}
requestAnimationFrame(ambient);
</script>

</body>
</html>
